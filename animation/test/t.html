<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.4/d3.min.js" integrity="sha512-nfUlp2ZWPKWlnAH/OsMeAqRSYBxOdPYeBXwceyw6QqqZ7uTT/s5/eS1hMKphjVBouk0jf/JQ8ULVJRnEqSHkXA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        const svg = d3.select('body')
          .append('svg')
          .attr('width', 500)
          .attr('height', 500)
        
        svg.append('rect')
          .attr('width', 10)
          .attr('height', 10)

        const link = d3.linkVertical()
          .x(d => d[0])
          .y(d => d[1])
          .source(([a, b]) => [a, b])
          .target(([_, __, a, b]) => [a, b])

        const p = [
          [100, 200, 200, 300],
          [100, 200, 100, 300],
          [110, 200, 100, 300],
          [130.5, 200, 100, 300],
          [140.5, 200, 100, 300],
          d3.range(4).map(d => Math.floor(Math.random() * 300)),
          d3.range(4).map(d => Math.floor(Math.random() * 300)),
          d3.range(4).map(d => Math.floor(Math.random() * 300)),
          d3.range(4).map(d => Math.floor(Math.random() * 300)),
          d3.range(4).map(d => Math.floor(Math.random() * 300)),
          d3.range(4).map(d => Math.floor(Math.random() * 300)),
          d3.range(4).map(d => Math.floor(Math.random() * 300)),
          d3.range(4).map(d => Math.floor(Math.random() * 300)),
          d3.range(4).map(d => Math.floor(Math.random() * 300)),
          d3.range(4).map(d => Math.floor(Math.random() * 300)),
]

        svg.selectAll('path')
          .data(p)
          .join('path')
          .attr('d', link)
          .attr('fill', 'none')
          .attr('stroke', 'black')

        // svg.selectAll('rect.ccc')

        //   .join('rect')
        //   .attr('x', d => d[0])
        //   .attr('y', d => d[1])
        //   .attr('width', d => Math.abs(d[0] - d[2]))
        //   .attr('height', d => Math.abs(d[1] - d[3]))
        //   .attr('fill', 'none')
        //   .attr('stroke', 'black')
        </script>
</body>
</html>
